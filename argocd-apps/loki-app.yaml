apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki-stack
    targetRevision: "*"
    helm:
      values: |
        loki:
          enabled: true
        promtail:
          enabled: true
        grafana:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  ignoreDifferences:
    - group: ""
      kind: ConfigMap
      name: loki-loki-stack
      namespace: monitoring
      jqPathExpressions:
        - .data["loki-stack-datasource.yaml"]
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
